<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annie & Bruce Wedding — Seating Chart</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Georgia', serif; background: #faf8f5; color: #3a3228; height: 100vh; display: flex; flex-direction: column; }

header { background: #3a3228; color: #f5efe6; display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; flex-shrink: 0; }
header .title { flex: 1; text-align: center; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; }
header span { font-size: 11px; opacity: 0.6; display: block; letter-spacing: 4px; margin-top: 3px; }
.header-print-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; color: #f5efe6; font-size: 11px; padding: 6px 14px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; font-family: Arial, sans-serif; transition: background 0.15s; white-space: nowrap; }
.header-print-btn:hover { background: rgba(255,255,255,0.25); }

.layout { display: flex; flex: 1; overflow: hidden; }

/* LEFT */
.sidebar { width: 250px; min-width: 220px; background: #fff; border-right: 1px solid #e8e0d5; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-top { padding: 12px 14px 8px; border-bottom: 1px solid #e8e0d5; flex-shrink: 0; }
.sidebar-top h3 { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #8b7355; margin-bottom: 8px; }
#search { width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 6px 10px; font-size: 13px; background: #faf8f5; color: #3a3228; outline: none; }
#search:focus { border-color: #c4a882; }
.guest-list { overflow-y: auto; flex: 1; padding: 4px 0 16px; }

.table-group { margin-bottom: 2px; }
.table-group-label {
  padding: 8px 10px 5px 14px;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: #c4a882; font-weight: bold;
  display: flex; align-items: center; gap: 6px; cursor: pointer;
}
.table-group-label:hover { color: #8b7355; }
.table-group-label .lbl-main { flex: 1; }
.lock-btn {
  background: none; border: 1px solid #ddd; border-radius: 4px;
  padding: 2px 6px; font-size: 11px; cursor: pointer; color: #bbb;
  transition: all 0.15s; flex-shrink: 0;
}
.lock-btn:hover { border-color: #c4a882; color: #8b7355; }
.lock-btn.locked { background: #3a3228; border-color: #3a3228; color: #f5efe6; }

.guest-item {
  padding: 5px 12px 5px 20px;
  font-size: 13px; cursor: grab;
  border-left: 3px solid transparent;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.12s;
  user-select: none;
}
.guest-item:active { cursor: grabbing; }
.guest-item:hover { background: #faf0e6; }
.guest-item.active { background: #f5e9d8; border-left-color: #c4a882; }
.guest-item.drag-over { border-top: 2px solid #c4a882; }
.guest-item.dragging { opacity: 0.35; }
.guest-item .seat-num { font-size: 10px; color: #bbb; min-width: 30px; }
.restriction-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: #e0a882; }
.no-dot { width: 7px; flex-shrink: 0; }
.locked-group .guest-item { cursor: default; }

/* CENTER */
.floorplan { flex: 1; overflow: auto; padding: 24px 16px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.floorplan-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #aaa; }
.floor-svg { max-width: 660px; width: 100%; }
.tbl-rect { cursor: pointer; }
.tbl-rect rect.main { transition: fill 0.2s; }
.tbl-rect:hover rect.main { fill: #e8d5bc; }
.tbl-num { font-family: Georgia, serif; font-size: 18px; fill: #8b7355; text-anchor: middle; dominant-baseline: middle; font-weight: bold; }
.tbl-count { font-family: Arial, sans-serif; font-size: 11px; fill: #aaa; text-anchor: middle; dominant-baseline: middle; }
.tbl-label { font-family: Georgia, serif; font-size: 11px; fill: #8b7355; text-anchor: middle; }

/* ROSTER (far left) */
.roster { width: 155px; min-width: 130px; background: #fdf9f5; border-right: 1px solid #e8e0d5; display: flex; flex-direction: column; overflow: hidden; }
.roster-top { padding: 10px 10px 8px; border-bottom: 1px solid #e8e0d5; flex-shrink: 0; }
.roster-top h3 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #8b7355; margin-bottom: 7px; }
.roster-add { display: flex; gap: 4px; }
.roster-add input { flex: 1; min-width: 0; border: 1px solid #ddd; border-radius: 3px; padding: 4px 6px; font-size: 11px; background: #fff; outline: none; }
.roster-add input:focus { border-color: #c4a882; }
.roster-add button { background: #c4a882; border: none; border-radius: 3px; color: #fff; font-size: 16px; line-height: 1; padding: 3px 7px; cursor: pointer; flex-shrink: 0; }
.roster-list { overflow-y: auto; flex: 1; padding: 4px 0 16px; }
.roster-item { display: flex; align-items: center; padding: 4px 6px 4px 10px; font-size: 11px; color: #3a3228; gap: 4px; }
.roster-item:hover { background: #faf0e6; }
.roster-item .rname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.roster-item .tbl-badge { font-size: 9px; color: #bbb; background: #f0ece8; padding: 1px 5px; border-radius: 8px; flex-shrink: 0; }
.roster-item .del-btn { background: none; border: none; color: #ddd; cursor: pointer; font-size: 13px; padding: 0 2px; line-height: 1; flex-shrink: 0; }
.roster-item .del-btn:hover { color: #c07070; }
.roster-item.unassigned .rname { color: #bbb; font-style: italic; }
.table-group-label.drag-over { background: #f5e9d8; border-radius: 4px; }

/* RIGHT */
.detail-panel { width: 320px; min-width: 280px; background: #fff; border-left: 1px solid #e8e0d5; display: flex; flex-direction: column; overflow: hidden; }
.panel-header { padding: 14px 18px 10px; border-bottom: 1px solid #e8e0d5; flex-shrink: 0; background: #faf8f5; display: flex; align-items: flex-start; justify-content: space-between; }
.panel-header-text { flex: 1; }
.panel-header h2 { font-size: 18px; color: #3a3228; }
.panel-header .meta { font-size: 11px; color: #aaa; letter-spacing: 1px; margin-top: 3px; }
.print-btn { background: #f0e8db; border: 1px solid #c4a882; border-radius: 4px; color: #8b7355; font-size: 11px; padding: 6px 12px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; font-family: Arial, sans-serif; transition: background 0.15s; flex-shrink: 0; margin-left: 10px; }
.print-btn:hover { background: #c4a882; color: #fff; }
.panel-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #ccc; font-size: 13px; text-align: center; padding: 40px; }
.panel-scroll { overflow-y: auto; flex: 1; }

/* Section dividers */
.section-title {
  padding: 10px 18px 6px;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: #c4a882; font-weight: bold;
  border-bottom: 1px solid #f0e8db;
  background: #fdf9f5;
  position: sticky; top: 0; z-index: 1;
}

/* Guest rows (top half) */
.guest-row {
  padding: 8px 18px;
  border-bottom: 1px solid #f5f0ea;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px;
}
.guest-row .gname { flex: 1; font-weight: bold; color: #3a3228; }
.guest-row .room-tag { font-size: 10px; color: #aaa; background: #f3ede6; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
.guest-row .order-tick { font-size: 14px; flex-shrink: 0; }
.guest-row .order-tick.has { color: #7ab87a; }
.guest-row .order-tick.none { color: #ddd; }
.diet-badge { font-size: 10px; color: #c06020; background: #fff0e0; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }

/* Food order rows (bottom half) */
.food-card { padding: 10px 18px; border-bottom: 1px solid #f5f0ea; }
.food-card .fname { font-size: 13px; font-weight: bold; color: #3a3228; margin-bottom: 5px; }
.food-row { display: flex; gap: 8px; align-items: flex-start; font-size: 12px; margin-top: 3px; }
.food-cat { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #c4a882; min-width: 70px; flex-shrink: 0; padding-top: 1px; }
.food-val { color: #555; }
</style>

function escapeHTML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const CAT_LABEL = { appetizer:'Appetizer', pork:'Pork', beef:'Beef', seafood:'Seafood', chicken:'Chicken' };
const TABLE_NAMES = { 1:'Table 1', 2:'Table 2', 3:'Table 3', 4:'Table 4', 5:'Table 5', 6:'Table 6', 7:'Table 7', 8:'Table 8' };
const TABLE_ORDER = [1,2,3,4,5,6,7,8];

// Mutable order + lock state
const tableOrder = {};
const tableLocked = {};
TABLE_ORDER.forEach(t => {
  const g = DATA.tables[t] || [];
  tableOrder[t] = g.map((_, i) => i);
  tableLocked[t] = false;
});

let selectedTable = null;
let dragSrcTable = null;
let dragSrcIdx = null;

function hasOrder(g) {
  if (!g.order) return false;
  return Object.values(g.order).some(v => v && v.trim());
}

// ── LEFT SIDEBAR ──────────────────────────────────────────────────
function buildSidebar(filter) {
  const el = document.getElementById('guestList');
  el.innerHTML = '';
  const q = (filter || '').toLowerCase();

  TABLE_ORDER.forEach(t => {
    const allGuests = DATA.tables[t] || [];
    const orderedGuests = tableOrder[t].map(i => allGuests[i]);
    const visible = q ? orderedGuests.filter(g => g.name.toLowerCase().includes(q)) : orderedGuests;
    if (!visible.length) return;

    const group = document.createElement('div');
    group.className = 'table-group' + (tableLocked[t] ? ' locked-group' : '');
    group.dataset.table = t;

    // Header
    const label = document.createElement('div');
    label.className = 'table-group-label';
    label.dataset.table = t;
    label.innerHTML = `<span class="lbl-main">${TABLE_NAMES[t]} · <span style="color:#ccc">${allGuests.length} pax</span></span>`;
    label.onclick = (e) => { if (!e.target.closest('.lock-btn')) selectTable(t); };
    label.addEventListener('dragover', onLabelDragOver);
    label.addEventListener('drop', onLabelDrop);

    const lockBtn = document.createElement('button');
    lockBtn.className = 'lock-btn' + (tableLocked[t] ? ' locked' : '');
    lockBtn.title = tableLocked[t] ? 'Unlock order' : 'Lock order';
    lockBtn.textContent = tableLocked[t] ? '🔒' : '🔓';
    lockBtn.onclick = (e) => { e.stopPropagation(); toggleLock(t); };
    label.appendChild(lockBtn);
    group.appendChild(label);

    // Guest items (only full list when no filter, to allow drag)
    const listGuests = q ? visible : orderedGuests;
    listGuests.forEach((g, localIdx) => {
      if (q && !g.name.toLowerCase().includes(q)) return;
      const item = document.createElement('div');
      item.className = 'guest-item';
      item.dataset.name = g.name;
      item.dataset.localIdx = localIdx;
      item.dataset.table = t;

      const locked = tableLocked[t];
      if (!locked && !q) {
        item.draggable = true;
        item.addEventListener('dragstart', onDragStart);
        item.addEventListener('dragover', onDragOver);
        item.addEventListener('drop', onDrop);
        item.addEventListener('dragend', onDragEnd);
      }

      const hasDiet = g.restriction && g.restriction !== 'NA';
      item.innerHTML = `
        <span class="seat-num">${escapeHTML(g.seat)}</span>
        ${hasDiet ? '<span class="restriction-dot"></span>' : '<span class="no-dot"></span>'}
        ${escapeHTML(g.name)}
      `;
      item.onclick = () => { selectTable(t); };
      group.appendChild(item);
    });

    el.appendChild(group);
  });
}

function toggleLock(t) {
  tableLocked[t] = !tableLocked[t];
  buildSidebar(document.getElementById('search').value);
  if (selectedTable == t) renderPanel(t);
}

// ── DRAG & DROP ────────────────────────────────────────────────────
function onDragStart(e) {
  dragSrcTable = parseInt(this.dataset.table);
  dragSrcIdx = parseInt(this.dataset.localIdx);
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  this.classList.add('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  const destTable = parseInt(this.dataset.table);
  const destIdx = parseInt(this.dataset.localIdx);
  if (destTable === dragSrcTable) {
    if (dragSrcIdx === destIdx) return;
    const order = tableOrder[dragSrcTable];
    const [moved] = order.splice(dragSrcIdx, 1);
    order.splice(destIdx, 0, moved);
  } else {
    if (tableLocked[dragSrcTable] || tableLocked[destTable]) return;
    moveGuestBetweenTables(dragSrcTable, dragSrcIdx, destTable, destIdx);
  }
  buildSidebar(document.getElementById('search').value);
  buildRoster();
  if (selectedTable === destTable || selectedTable === dragSrcTable) renderPanel(selectedTable);
}
function onDragEnd() {
  document.querySelectorAll('.guest-item.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function onLabelDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  const destTable = parseInt(this.dataset.table);
  if (dragSrcTable !== null && !tableLocked[destTable] && destTable !== dragSrcTable) this.classList.add('drag-over');
}
function onLabelDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  const destTable = parseInt(this.dataset.table);
  if (destTable === dragSrcTable || tableLocked[destTable] || tableLocked[dragSrcTable]) return;
  moveGuestBetweenTables(dragSrcTable, dragSrcIdx, destTable, tableOrder[destTable].length);
  buildSidebar(document.getElementById('search').value);
  buildRoster();
  if (selectedTable === destTable || selectedTable === dragSrcTable) renderPanel(selectedTable);
}

// ── MOVE GUEST BETWEEN TABLES ──────────────────────────────────────
function moveGuestBetweenTables(srcTable, srcLocalIdx, destTable, destLocalIdx) {
  const srcOrder = tableOrder[srcTable];
  const dstOrder = tableOrder[destTable];
  const srcArrayIdx = srcOrder[srcLocalIdx];
  const guest = DATA.tables[srcTable][srcArrayIdx];
  DATA.tables[srcTable].splice(srcArrayIdx, 1);
  srcOrder.splice(srcLocalIdx, 1);
  for (let i = 0; i < srcOrder.length; i++) { if (srcOrder[i] > srcArrayIdx) srcOrder[i]--; }
  guest.table = destTable;
  DATA.tables[destTable].push(guest);
  dstOrder.splice(destLocalIdx, 0, DATA.tables[destTable].length - 1);
}

// ── ROSTER ─────────────────────────────────────────────────────────
const rosterExtras = [];

function buildRoster() {
  const el = document.getElementById('rosterList');
  el.innerHTML = '';
  const all = [];
  TABLE_ORDER.forEach(t => {
    const guests = DATA.tables[t] || [];
    tableOrder[t].forEach(i => { if (guests[i]) all.push({ name: guests[i].name, table: t }); });
  });
  all.sort((a, b) => a.name.localeCompare(b.name));
  all.forEach(({ name, table }) => {
    const item = document.createElement('div');
    item.className = 'roster-item';
    item.innerHTML = `<span class="rname">${escapeHTML(name)}</span><span class="tbl-badge">T${table}</span>`;
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.title = 'Remove';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', () => deleteGuest(name, table));
    item.appendChild(delBtn);
    el.appendChild(item);
  });
  rosterExtras.forEach((name, idx) => {
    const item = document.createElement('div');
    item.className = 'roster-item unassigned';
    item.innerHTML = `<span class="rname">${escapeHTML(name)}</span><span class="tbl-badge">—</span>`;
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.title = 'Remove';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', () => deleteExtra(idx));
    item.appendChild(delBtn);
    el.appendChild(item);
  });
}

function addRosterGuest() {
  const input = document.getElementById('rosterInput');
  const name = input.value.trim();
  if (!name) return;
  rosterExtras.push(name);
  input.value = '';
  buildRoster();
}

function deleteGuest(name, table) {
  const guests = DATA.tables[table];
  if (!guests) return;
  const arrayIdx = guests.findIndex(g => g.name === name);
  if (arrayIdx === -1) return;
  guests.splice(arrayIdx, 1);
  const ord = tableOrder[table];
  const pos = ord.indexOf(arrayIdx);
  if (pos !== -1) ord.splice(pos, 1);
  for (let i = 0; i < ord.length; i++) { if (ord[i] > arrayIdx) ord[i]--; }
  buildSidebar(document.getElementById('search').value);
  buildRoster();
  if (selectedTable === table) renderPanel(table);
}

function deleteExtra(idx) {
  rosterExtras.splice(idx, 1);
  buildRoster();
}

// ── TABLE SELECT ───────────────────────────────────────────────────
function selectTable(t) {
  selectedTable = t;
  document.querySelectorAll('.tbl-rect').forEach(el => {
    el.querySelector('rect.main').style.fill = '#f0e8db';
  });
  const tblEl = document.getElementById('tbl-' + t);
  if (tblEl) tblEl.querySelector('rect.main').style.fill = '#c4a882';
  renderPanel(t);
}

// ── RIGHT PANEL ────────────────────────────────────────────────────
function renderPanel(t) {
  const allGuests = DATA.tables[t] || [];
  const guests = tableOrder[t].map(i => allGuests[i]);
  const locked = tableLocked[t];

  const emptyEl = document.getElementById('panelEmpty');
  if (emptyEl) emptyEl.style.display = 'none';
  document.getElementById('panelHeader').innerHTML = `
    <div class="panel-header">
      <div class="panel-header-text">
        <h2>${TABLE_NAMES[t]} ${locked ? '🔒' : ''}</h2>
        <div class="meta">${guests.length} GUESTS · 8 MAY 2026</div>
      </div>
      <button class="print-btn" onclick="printAll()">🖨 Print All</button>
    </div>`;

  const scroll = document.getElementById('panelScroll');
  scroll.innerHTML = '';

  // ── Section 1: Guest List ─────────────────────────────────────
  const guestSection = document.createElement('div');
  guestSection.innerHTML = '<div class="section-title">Guests</div>';

  guests.forEach(g => {
    const hasDiet = g.restriction && g.restriction !== 'NA';
    const ordered = hasOrder(g);
    const row = document.createElement('div');
    row.className = 'guest-row';
    row.innerHTML = `
      <span class="gname">${escapeHTML(g.name)}</span>
      ${hasDiet ? `<span class="diet-badge">⚠ ${escapeHTML(g.restriction)}</span>` : ''}
      <span class="room-tag">Rm ${escapeHTML(g.room)}</span>
      <span class="order-tick ${ordered ? 'has' : 'none'}" title="${ordered ? 'Has pre-order' : 'No pre-order'}">${ordered ? '✓' : '✗'}</span>
    `;
    guestSection.appendChild(row);
  });
  scroll.appendChild(guestSection);

  // ── Section 2: Food Orders ────────────────────────────────────
  const foodSection = document.createElement('div');
  foodSection.innerHTML = '<div class="section-title">Food Orders</div>';

  const orderedGuests = guests.filter(g => hasOrder(g));
  if (!orderedGuests.length) {
    foodSection.innerHTML += '<div style="padding:14px 18px;font-size:12px;color:#ccc;font-style:italic;">No pre-orders on file for this table</div>';
  } else {
    orderedGuests.forEach(g => {
      const card = document.createElement('div');
      card.className = 'food-card';
      const rows = Object.entries(CAT_LABEL).map(([k, label]) => {
        const val = g.order[k];
        if (!val) return '';
        return `<div class="food-row"><span class="food-cat">${escapeHTML(label)}</span><span class="food-val">${escapeHTML(val)}</span></div>`;
      }).join('');
      card.innerHTML = `<div class="fname">${escapeHTML(g.name)}</div>${rows}`;
      foodSection.appendChild(card);
    });
  }
  scroll.appendChild(foodSection);
}

// ── PRINT ──────────────────────────────────────────────────────────
function buildTablePageHTML(t) {
  const allGuests = DATA.tables[t] || [];
  const guests = tableOrder[t].map(i => allGuests[i]);

  const catAgg = {};
  Object.keys(CAT_LABEL).forEach(k => { catAgg[k] = {}; });
  guests.forEach(g => {
    if (!g.order) return;
    Object.entries(CAT_LABEL).forEach(([k]) => {
      const val = (g.order[k] || '').trim();
      if (!val) return;
      catAgg[k][val] = (catAgg[k][val] || 0) + 1;
    });
  });

  const guestListHTML = guests.map(g => {
    const diet = g.restriction && g.restriction !== 'NA' ? ` <span class="diet">(${escapeHTML(g.restriction)})</span>` : '';
    return `<li>${escapeHTML(g.name)}${diet}</li>`;
  }).join('');

  let foodHTML = '';
  Object.entries(CAT_LABEL).forEach(([k, label]) => {
    const dishes = catAgg[k];
    if (!Object.keys(dishes).length) return;
    foodHTML += `<div class="cat-label">${label}</div>`;
    Object.entries(dishes).forEach(([dish, count]) => {
      foodHTML += `<div class="dish-row"><span class="dish-name">${escapeHTML(dish)}</span>${count > 1 ? `<span class="count">×${count}</span>` : ''}</div>`;
    });
  });
  if (!foodHTML) foodHTML = '<p class="none">No pre-orders on file.</p>';

  return `<div class="page">
    <div class="page-header"><span class="event-label">Annie &amp; Bruce · 8 May 2026</span></div>
    <h1>${TABLE_NAMES[t]}</h1>
    <div class="sub">${guests.length} GUESTS</div>
    <div class="section-label">Guests</div>
    <ul>${guestListHTML}</ul>
    <div class="section-label">Food Orders</div>
    ${foodHTML}
  </div>`;
}

function buildSummaryPageHTML() {
  const totalAgg = {};
  Object.keys(CAT_LABEL).forEach(k => { totalAgg[k] = {}; });
  TABLE_ORDER.forEach(t => {
    (DATA.tables[t] || []).forEach(g => {
      if (!g.order) return;
      Object.entries(CAT_LABEL).forEach(([k]) => {
        const val = (g.order[k] || '').trim();
        if (!val) return;
        totalAgg[k][val] = (totalAgg[k][val] || 0) + 1;
      });
    });
  });

  let grandTotal = 0;
  let summaryHTML = '';
  Object.entries(CAT_LABEL).forEach(([k, label]) => {
    const dishes = totalAgg[k];
    const entries = Object.entries(dishes).sort((a, b) => b[1] - a[1]);
    if (!entries.length) return;
    const catTotal = entries.reduce((s, [, c]) => s + c, 0);
    grandTotal += catTotal;
    summaryHTML += `<div class="cat-label">${label} <span class="cat-total">(${catTotal})</span></div>`;
    entries.forEach(([dish, count]) => {
      summaryHTML += `<div class="dish-row summary-row"><span class="dish-name">${escapeHTML(dish)}</span><span class="dish-count">${count}</span></div>`;
    });
  });

  return `<div class="page last-page">
    <div class="page-header"><span class="event-label">Annie &amp; Bruce · 8 May 2026</span></div>
    <h1>Food Summary</h1>
    <div class="sub">ALL TABLES · ${grandTotal} TOTAL ORDERS</div>
    ${summaryHTML}
  </div>`;
}

function printAll() {
  const pages = TABLE_ORDER.map(t => buildTablePageHTML(t));
  pages.push(buildSummaryPageHTML());

  const win = window.open('', '_blank', 'width=620,height=850');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Annie &amp; Bruce — Seating Print</title>
<style>
